<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Form đăng ký nhiều bước</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 30px;
      font-family: Arial, sans-serif;
      background: #f3f6fb;
    }

    .container {
      max-width: 560px;
      margin: 0 auto;
      background: #fff;
      border-radius: 14px;
      padding: 24px;
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.08);
    }

    h1 {
      text-align: center;
      margin-top: 0;
      color: #222;
    }

    .progress-info {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
      font-size: 14px;
      color: #444;
      font-weight: bold;
    }

    .progress-bar {
      width: 100%;
      height: 10px;
      background: #e4e9f2;
      border-radius: 999px;
      overflow: hidden;
      margin-bottom: 24px;
    }

    .progress-fill {
      height: 100%;
      width: 33.33%;
      background: #1976d2;
      transition: width 0.3s ease;
    }

    .step {
      display: none;
    }

    .step.active {
      display: block;
    }

    .step-title {
      margin: 0 0 18px;
      color: #1976d2;
      font-size: 20px;
    }

    .form-group {
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-weight: bold;
      margin-bottom: 6px;
      color: #333;
    }

    input[type="text"],
    input[type="email"],
    input[type="password"],
    input[type="date"] {
      width: 100%;
      padding: 11px 12px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 15px;
      outline: none;
    }

    input.error {
      border-color: #e53935;
      background: #fff5f5;
    }

    .radio-group {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      align-items: center;
    }

    .radio-group label {
      font-weight: normal;
      margin-bottom: 0;
    }

    .radio-group.error-box {
      outline: 2px solid #e53935;
      border-radius: 8px;
      padding: 8px;
    }

    .error-message {
      color: #e53935;
      font-size: 14px;
      margin-top: 5px;
      min-height: 18px;
    }

    .button-group {
      display: flex;
      gap: 12px;
      margin-top: 22px;
    }

    button {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      cursor: pointer;
    }

    .btn-prev {
      background: #e0e0e0;
      color: #333;
    }

    .btn-prev:hover {
      background: #cfcfcf;
    }

    .btn-next,
    .btn-submit {
      background: #1976d2;
      color: #fff;
    }

    .btn-next:hover,
    .btn-submit:hover {
      background: #125ca1;
    }

    .summary-box {
      background: #f8fbff;
      border: 1px solid #d7e7fb;
      border-radius: 10px;
      padding: 16px;
      line-height: 1.8;
    }

    .summary-item {
      margin-bottom: 8px;
    }

    .summary-label {
      font-weight: bold;
      color: #333;
    }

    .success-box {
      display: none;
      text-align: center;
      padding: 28px 20px;
      border-radius: 12px;
      background: #f1fff4;
      border: 1px solid #b7ebc6;
      color: #1b5e20;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Đăng ký nhiều bước</h1>

    <div class="progress-info">
      <span id="stepText">Bước 1 / 3</span>
      <span id="stepName">Thông tin cá nhân</span>
    </div>

    <div class="progress-bar">
      <div class="progress-fill" id="progressFill"></div>
    </div>

    <form id="multiStepForm">
      <!-- BƯỚC 1 -->
      <div class="step active" id="step1">
        <h2 class="step-title">Bước 1 – Thông tin cá nhân</h2>

        <div class="form-group">
          <label for="fullname">Họ tên</label>
          <input type="text" id="fullname" />
          <div class="error-message" id="fullname-error"></div>
        </div>

        <div class="form-group">
          <label for="birthdate">Ngày sinh</label>
          <input type="date" id="birthdate" />
          <div class="error-message" id="birthdate-error"></div>
        </div>

        <div class="form-group">
          <label>Giới tính</label>
          <div class="radio-group" id="gender-group">
            <label><input type="radio" name="gender" value="Nam" /> Nam</label>
            <label><input type="radio" name="gender" value="Nữ" /> Nữ</label>
            <label><input type="radio" name="gender" value="Khác" /> Khác</label>
          </div>
          <div class="error-message" id="gender-error"></div>
        </div>

        <div class="button-group">
          <button type="button" class="btn-next" id="next1">Tiếp theo</button>
        </div>
      </div>

      <!-- BƯỚC 2 -->
      <div class="step" id="step2">
        <h2 class="step-title">Bước 2 – Thông tin tài khoản</h2>

        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" />
          <div class="error-message" id="email-error"></div>
        </div>

        <div class="form-group">
          <label for="password">Mật khẩu</label>
          <input type="password" id="password" />
          <div class="error-message" id="password-error"></div>
        </div>

        <div class="form-group">
          <label for="confirmPassword">Xác nhận mật khẩu</label>
          <input type="password" id="confirmPassword" />
          <div class="error-message" id="confirmPassword-error"></div>
        </div>

        <div class="button-group">
          <button type="button" class="btn-prev" id="prev2">Quay lại</button>
          <button type="button" class="btn-next" id="next2">Tiếp theo</button>
        </div>
      </div>

      <!-- BƯỚC 3 -->
      <div class="step" id="step3">
        <h2 class="step-title">Bước 3 – Xác nhận thông tin</h2>

        <div class="summary-box" id="summaryBox">
          <div class="summary-item">
            <span class="summary-label">Họ tên:</span>
            <span id="summary-fullname"></span>
          </div>
          <div class="summary-item">
            <span class="summary-label">Ngày sinh:</span>
            <span id="summary-birthdate"></span>
          </div>
          <div class="summary-item">
            <span class="summary-label">Giới tính:</span>
            <span id="summary-gender"></span>
          </div>
          <div class="summary-item">
            <span class="summary-label">Email:</span>
            <span id="summary-email"></span>
          </div>
          <div class="summary-item">
            <span class="summary-label">Mật khẩu:</span>
            <span id="summary-password"></span>
          </div>
        </div>

        <div class="button-group">
          <button type="button" class="btn-prev" id="prev3">Quay lại</button>
          <button type="submit" class="btn-submit">Xác nhận đăng ký</button>
        </div>
      </div>
    </form>

    <div class="success-box" id="successBox">
      <h2>Đăng ký thành công! 🎉</h2>
      <p>Cảm ơn bạn đã hoàn tất form đăng ký nhiều bước.</p>
    </div>
  </div>

  <script>
    const form = document.getElementById("multiStepForm");
    const steps = document.querySelectorAll(".step");
    const progressFill = document.getElementById("progressFill");
    const stepText = document.getElementById("stepText");
    const stepName = document.getElementById("stepName");
    const successBox = document.getElementById("successBox");

    const fullname = document.getElementById("fullname");
    const birthdate = document.getElementById("birthdate");
    const genderInputs = document.querySelectorAll('input[name="gender"]');

    const email = document.getElementById("email");
    const password = document.getElementById("password");
    const confirmPassword = document.getElementById("confirmPassword");

    let currentStep = 1;
    const totalSteps = 3;

    function showError(fieldId, message) {
      const field = document.getElementById(fieldId);
      const error = document.getElementById(fieldId + "-error");

      if (field) {
        field.classList.add("error");
      }

      if (error) {
        error.textContent = message;
      }
    }

    function clearError(fieldId) {
      const field = document.getElementById(fieldId);
      const error = document.getElementById(fieldId + "-error");

      if (field) {
        field.classList.remove("error");
      }

      if (error) {
        error.textContent = "";
      }
    }

    function showGenderError(message) {
      const group = document.getElementById("gender-group");
      const error = document.getElementById("gender-error");

      group.classList.add("error-box");
      error.textContent = message;
    }

    function clearGenderError() {
      const group = document.getElementById("gender-group");
      const error = document.getElementById("gender-error");

      group.classList.remove("error-box");
      error.textContent = "";
    }

    function validateFullname() {
      const value = fullname.value.trim();
      const regex = /^[A-Za-zÀ-ỹ\s]+$/u;

      if (value === "") {
        showError("fullname", "Họ tên không được để trống.");
        return false;
      }

      if (value.length < 3) {
        showError("fullname", "Họ tên phải có ít nhất 3 ký tự.");
        return false;
      }

      if (!regex.test(value)) {
        showError("fullname", "Họ tên chỉ được chứa chữ cái và khoảng trắng.");
        return false;
      }

      clearError("fullname");
      return true;
    }

    function validateBirthdate() {
      const value = birthdate.value;

      if (value === "") {
        showError("birthdate", "Vui lòng chọn ngày sinh.");
        return false;
      }

      const selectedDate = new Date(value);
      const today = new Date();

      selectedDate.setHours(0, 0, 0, 0);
      today.setHours(0, 0, 0, 0);

      if (selectedDate >= today) {
        showError("birthdate", "Ngày sinh phải nhỏ hơn ngày hiện tại.");
        return false;
      }

      clearError("birthdate");
      return true;
    }

    function validateGender() {
      const checked = document.querySelector('input[name="gender"]:checked');

      if (!checked) {
        showGenderError("Vui lòng chọn giới tính.");
        return false;
      }

      clearGenderError();
      return true;
    }

    function validateEmail() {
      const value = email.value.trim();
      const regex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

      if (value === "") {
        showError("email", "Email không được để trống.");
        return false;
      }

      if (!regex.test(value)) {
        showError("email", "Email không đúng định dạng.");
        return false;
      }

      clearError("email");
      return true;
    }

    function validatePassword() {
      const value = password.value;
      const regex = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d).{8,}$/;

      if (value === "") {
        showError("password", "Mật khẩu không được để trống.");
        return false;
      }

      if (!regex.test(value)) {
        showError("password", "Mật khẩu phải có ít nhất 8 ký tự, gồm chữ hoa, chữ thường và số.");
        return false;
      }

      clearError("password");
      return true;
    }

    function validateConfirmPassword() {
      const value = confirmPassword.value;

      if (value === "") {
        showError("confirmPassword", "Vui lòng xác nhận mật khẩu.");
        return false;
      }

      if (value !== password.value) {
        showError("confirmPassword", "Xác nhận mật khẩu không khớp.");
        return false;
      }

      clearError("confirmPassword");
      return true;
    }

    function validateStep1() {
      return validateFullname() && validateBirthdate() && validateGender();
    }

    function validateStep2() {
      return validateEmail() && validatePassword() && validateConfirmPassword();
    }

    function updateProgress() {
      stepText.textContent = `Bước ${currentStep} / ${totalSteps}`;

      const stepNames = {
        1: "Thông tin cá nhân",
        2: "Thông tin tài khoản",
        3: "Xác nhận"
      };

      stepName.textContent = stepNames[currentStep];
      progressFill.style.width = `${(currentStep / totalSteps) * 100}%`;
    }

    function showStep(stepNumber) {
      steps.forEach(function(step, index) {
        step.classList.toggle("active", index + 1 === stepNumber);
      });

      currentStep = stepNumber;
      updateProgress();

      if (currentStep === 3) {
        updateSummary();
      }
    }

    function formatDateVN(dateString) {
      const date = new Date(dateString);
      const day = String(date.getDate()).padStart(2, "0");
      const month = String(date.getMonth() + 1).padStart(2, "0");
      const year = date.getFullYear();
      return `${day}/${month}/${year}`;
    }

    function updateSummary() {
      const selectedGender = document.querySelector('input[name="gender"]:checked');

      document.getElementById("summary-fullname").textContent = fullname.value.trim();
      document.getElementById("summary-birthdate").textContent = formatDateVN(birthdate.value);
      document.getElementById("summary-gender").textContent = selectedGender ? selectedGender.value : "";
      document.getElementById("summary-email").textContent = email.value.trim();
      document.getElementById("summary-password").textContent = "*".repeat(password.value.length);
    }

    document.getElementById("next1").addEventListener("click", function() {
      if (validateStep1()) {
        showStep(2);
      }
    });

    document.getElementById("next2").addEventListener("click", function() {
      if (validateStep2()) {
        showStep(3);
      }
    });

    document.getElementById("prev2").addEventListener("click", function() {
      showStep(1);
    });

    document.getElementById("prev3").addEventListener("click", function() {
      showStep(2);
    });

    form.addEventListener("submit", function(event) {
      event.preventDefault();

      if (!validateStep1() || !validateStep2()) {
        return;
      }

      form.style.display = "none";
      successBox.style.display = "block";
    });

    fullname.addEventListener("blur", validateFullname);
    birthdate.addEventListener("blur", validateBirthdate);
    email.addEventListener("blur", validateEmail);
    password.addEventListener("blur", validatePassword);
    confirmPassword.addEventListener("blur", validateConfirmPassword);

    fullname.addEventListener("input", function() {
      clearError("fullname");
    });

    birthdate.addEventListener("input", function() {
      clearError("birthdate");
    });

    email.addEventListener("input", function() {
      clearError("email");
    });

    password.addEventListener("input", function() {
      clearError("password");
      if (confirmPassword.value !== "") {
        clearError("confirmPassword");
      }
    });

    confirmPassword.addEventListener("input", function() {
      clearError("confirmPassword");
    });

    genderInputs.forEach(function(radio) {
      radio.addEventListener("change", function() {
        clearGenderError();
      });
    });

    updateProgress();
  </script>
</body>
</html>
