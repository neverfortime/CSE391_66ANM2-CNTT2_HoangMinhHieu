<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quản lý điểm sinh viên</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      margin: 0;
      padding: 30px;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      background: #fff;
      padding: 24px;
      border-radius: 12px;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.08);
    }

    h1 {
      margin-top: 0;
      text-align: center;
      color: #333;
    }

    .form-group {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    .form-group input {
      flex: 1;
      min-width: 220px;
      padding: 10px 12px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 16px;
    }

    .form-group button {
      padding: 10px 18px;
      border: none;
      border-radius: 8px;
      background: #007bff;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    .form-group button:hover {
      background: #0056b3;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      overflow: hidden;
      border-radius: 8px;
    }

    th,
    td {
      border: 1px solid #ddd;
      padding: 12px;
      text-align: center;
    }

    th {
      background: #007bff;
      color: white;
    }

    tbody tr:nth-child(even) {
      background: #f9f9f9;
    }

    .weak-row {
      background: #fff3cd !important;
    }

    .delete-btn {
      background: #dc3545;
      color: white;
      border: none;
      padding: 7px 12px;
      border-radius: 6px;
      cursor: pointer;
    }

    .delete-btn:hover {
      background: #b02a37;
    }

    .stats {
      margin-top: 18px;
      font-size: 17px;
      font-weight: bold;
      color: #333;
    }

    .empty-message {
      text-align: center;
      color: #777;
      padding: 16px 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Quản lý điểm sinh viên</h1>

    <div class="form-group">
      <input type="text" id="fullName" placeholder="Nhập họ tên" />
      <input type="number" id="score" placeholder="Nhập điểm (0 - 10)" min="0" max="10" step="0.1" />
      <button id="addBtn">Thêm</button>
    </div>

    <table>
      <thead>
        <tr>
          <th>STT</th>
          <th>Họ tên</th>
          <th>Điểm</th>
          <th>Xếp loại</th>
          <th>Thao tác</th>
        </tr>
      </thead>
      <tbody id="studentTableBody">
        <tr>
          <td colspan="5" class="empty-message">Chưa có sinh viên nào</td>
        </tr>
      </tbody>
    </table>

    <div class="stats" id="stats">
      Tổng số sinh viên: 0 | Điểm trung bình: 0.00
    </div>
  </div>

  <script>
    const fullNameInput = document.getElementById("fullName");
    const scoreInput = document.getElementById("score");
    const addBtn = document.getElementById("addBtn");
    const studentTableBody = document.getElementById("studentTableBody");
    const stats = document.getElementById("stats");

    const students = [];

    function getRank(score) {
      if (score >= 8.5) return "Giỏi";
      if (score >= 7.0) return "Khá";
      if (score >= 5.0) return "Trung bình";
      return "Yếu";
    }

    function updateStats() {
      const total = students.length;

      if (total === 0) {
        stats.textContent = "Tổng số sinh viên: 0 | Điểm trung bình: 0.00";
        return;
      }

      const sum = students.reduce((acc, student) => acc + student.score, 0);
      const average = sum / total;

      stats.textContent = `Tổng số sinh viên: ${total} | Điểm trung bình: ${average.toFixed(2)}`;
    }

    function renderTable() {
      if (students.length === 0) {
        studentTableBody.innerHTML = `
          <tr>
            <td colspan="5" class="empty-message">Chưa có sinh viên nào</td>
          </tr>
        `;
        updateStats();
        return;
      }

      let html = "";

      students.forEach((student, index) => {
        const rank = getRank(student.score);
        const weakClass = student.score < 5 ? "weak-row" : "";

        html += `
          <tr class="${weakClass}">
            <td>${index + 1}</td>
            <td>${student.fullName}</td>
            <td>${student.score.toFixed(1)}</td>
            <td>${rank}</td>
            <td>
              <button class="delete-btn" data-index="${index}">Xóa</button>
            </td>
          </tr>
        `;
      });

      studentTableBody.innerHTML = html;
      updateStats();
    }

    function addStudent() {
      const fullName = fullNameInput.value.trim();
      const scoreValue = scoreInput.value.trim();
      const score = Number(scoreValue);

      if (fullName === "") {
        alert("Họ tên không được để trống.");
        fullNameInput.focus();
        return;
      }

      if (scoreValue === "" || isNaN(score) || score < 0 || score > 10) {
        alert("Điểm phải là số hợp lệ từ 0 đến 10.");
        scoreInput.focus();
        return;
      }

      students.push({
        fullName,
        score
      });

      renderTable();

      fullNameInput.value = "";
      scoreInput.value = "";
      fullNameInput.focus();
    }

    addBtn.addEventListener("click", addStudent);

    scoreInput.addEventListener("keydown", function (event) {
      if (event.key === "Enter") {
        addStudent();
      }
    });

    studentTableBody.addEventListener("click", function (event) {
      if (event.target.classList.contains("delete-btn")) {
        const index = Number(event.target.dataset.index);
        students.splice(index, 1);
        renderTable();
      }
    });
  </script>
</body>
</html>
